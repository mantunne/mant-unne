<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mantenimiento FIUNNE 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --fiunne-orange: #f06423; --fiunne-gray: #374151; }
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #1e293b; touch-action: manipulation; }
        .loading-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); display: none; justify-content: center; align-items: center; z-index: 9999; flex-direction: column; color: white; }
        .tab-active { border-bottom: 4px solid var(--fiunne-orange); color: var(--fiunne-orange); font-weight: 900; background: #fff7ed; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input, select, textarea { border: 1px solid #cbd5e1 !important; border-radius: 8px !important; padding: 12px !important; width: 100%; margin-bottom: 12px; font-size: 16px; }
        label { font-weight: 700; font-size: 0.75rem; color: #64748b; text-transform: uppercase; margin-bottom: 4px; display: block; }
        .btn-primary { background: var(--fiunne-orange); color: white; font-weight: 900; padding: 16px; border-radius: 12px; width: 100%; text-transform: uppercase; }
        .hidden { display: none; }
    </style>
</head>
<body class="pb-20">

    <div id="loading" class="loading-overlay">
        <div class="w-10 h-10 border-4 border-white border-t-orange-500 rounded-full animate-spin mb-4"></div>
        <p class="text-xs font-bold uppercase tracking-widest">Sincronizando...</p>
    </div>

    <div id="login-screen" class="fixed inset-0 bg-white z-[5000] flex flex-col items-center justify-center p-8">
        <img src="https://ingenieria.unne.edu.ar/assets/img/logo-fi-horizontal.png" class="w-64 mb-8">
        <h1 class="text-2xl font-black mb-6 text-slate-800 uppercase tracking-tighter">SGM FIUNNE 2026</h1>
        <input type="password" id="pin" placeholder="PIN" class="text-center text-3xl font-black !border-2">
        <button onclick="checkPin()" class="btn-primary w-full max-w-xs mt-2">Ingresar</button>
    </div>

    <header class="bg-white shadow-sm p-4 sticky top-0 z-50 flex justify-between items-center border-b">
        <div>
            <h1 class="text-xl font-black text-slate-900 leading-none">SGM PRO</h1>
            <p class="text-[10px] text-orange-600 font-black uppercase mt-1">Gestión de Mantenimiento</p>
        </div>
    </header>

    <nav class="flex bg-white sticky top-[61px] z-40 overflow-x-auto no-scrollbar shadow-sm border-b">
        <button onclick="showT('nueva')" id="t-nueva" class="flex-1 py-4 px-4 text-[10px] font-bold uppercase tab-active">Nueva OT</button>
        <button onclick="showT('cierre')" id="t-cierre" class="flex-1 py-4 px-4 text-[10px] font-bold uppercase">Cierre</button>
        <button onclick="showT('relev')" id="t-relev" class="flex-1 py-4 px-4 text-[10px] font-bold uppercase">Relevamiento</button>
        <button onclick="showT('historial')" id="t-historial" class="flex-1 py-4 px-4 text-[10px] font-bold uppercase">Historial</button>
    </nav>

    <main class="p-4 max-w-lg mx-auto">
        <section id="s-nueva">
            <div class="bg-white p-6 rounded-2xl shadow-sm border">
                <label>Tipo</label>
                <select id="ot-tipo"><option>Correctivo</option><option>Preventivo</option></select>
                <label>Especialidad</label>
                <select id="ot-esp">
                    <option>Electrico</option><option>Refrigeracion</option><option>Herreria</option><option>Plomeria</option><option>Albañileria</option>
                </select>
                <label>Edificio</label>
                <select id="ot-edif" onchange="loadData('ot-edif','ot-sec','ot-ubi')"><option value="">Cargando...</option></select>
                <label>Sector</label>
                <select id="ot-sec" disabled onchange="filterUbi('ot-sec','ot-ubi')"><option value="">Sector...</option></select>
                <label>Ubicación</label>
                <select id="ot-ubi" disabled><option value="">Ubi...</option></select>
                <label>Reportado por</label>
                <input type="text" id="ot-repo">
                <label>Personal</label>
                <input type="text" id="ot-pers">
                <label>Descripción</label>
                <textarea id="ot-desc" rows="3"></textarea>
                <button onclick="enviarOT()" class="btn-primary w-full mt-2">Generar Orden</button>
            </div>
        </section>

        <section id="s-cierre" class="hidden">
            <div class="bg-white p-6 rounded-2xl shadow-sm border">
                <label>OT Abierta</label>
                <select id="c-id-ot"><option value="">Cargando...</option></select>
                <label>Materiales</label>
                <textarea id="c-mat" rows="3"></textarea>
                <label>Resolución</label>
                <textarea id="c-com" rows="3"></textarea>
                <button onclick="cerrarOT()" class="btn-primary w-full">Finalizar</button>
            </div>
        </section>

        <section id="s-relev" class="hidden">
            <div class="bg-white p-6 rounded-2xl shadow-sm border">
                <label>Edificio</label>
                <select id="r-edif" onchange="loadData('r-edif','r-sec','r-ubi')"><option value="">Cargando...</option></select>
                <label>Sector</label>
                <select id="r-sec" disabled onchange="filterUbi('r-sec','r-ubi')"><option value="">Sector...</option></select>
                <label>Ubicación</label>
                <select id="r-ubi" disabled onchange="fillRelev()"><option value="">Ubi...</option></select>
                <div id="form-r" class="hidden mt-4 pt-4 border-t border-dashed">
                    <div class="grid grid-cols-2 gap-2">
                        <div><label>Inv. Aire</label><input type="text" id="ri-aire"></div>
                        <div><label>Mod. Aire</label><input type="text" id="re-aire"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div><label>Tipo Lum.</label><input type="text" id="rt-lum"></div>
                        <div><label>Cant. Lum.</label><input type="number" id="rc-lam"></div>
                    </div>
                    <button onclick="saveRelev()" class="btn-primary w-full mt-2">Actualizar</button>
                </div>
            </div>
        </section>

        <section id="s-historial" class="hidden space-y-3"></section>
    </main>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbz7VAhfimoCsMzifLCHEiOY18VBxyVaWLDSrhYyp83VlcHTOlLCcAzEKBPaTEP8lamP4g/exec";
        const PIN_CORRECTO = "4370";
        let dbFull = [];
        let currentRow = null;

        function showL(v) { document.getElementById('loading').style.display = v ? 'flex' : 'none'; }

        function checkPin() {
            if(document.getElementById('pin').value === PIN_CORRECTO) {
                document.getElementById('login-screen').classList.add('hidden');
                init();
            } else { alert("PIN Incorrecto"); }
        }

        async function init() {
            showL(true);
            try {
                const eds = await fetch(`${URL}?action=getEdificios&token=${PIN_CORRECTO}`).then(r=>r.json());
                const opt = '<option value="">Seleccione...</option>' + eds.map(e=>`<option value="${e}">${e}</option>`).join("");
                document.getElementById('ot-edif').innerHTML = opt;
                document.getElementById('r-edif').innerHTML = opt;
                
                const ots = await fetch(`${URL}?action=getAbiertas&token=${PIN_CORRECTO}`).then(r=>r.json());
                document.getElementById('c-id-ot').innerHTML = '<option value="">Seleccionar OT...</option>' + ots.map(o=>`<option value="${o.id}">${o.detalle}</option>`).join("");
            } catch(e) { console.error(e); }
            showL(false);
        }

        async function loadData(eI, sI, uI) {
            const ed = document.getElementById(eI).value;
            if(!ed) return;
            showL(true);
            dbFull = await fetch(`${URL}?action=getSectores&edificio=${encodeURIComponent(ed)}&token=${PIN_CORRECTO}`).then(r=>r.json());
            const secs = [...new Set(dbFull.map(x=>x.sector))].filter(s=>s);
            document.getElementById(sI).innerHTML = '<option value="">Sector...</option>' + secs.map(s=>`<option value="${s}">${s}</option>`).join("");
            document.getElementById(sI).disabled = false;
            document.getElementById(uI).disabled = true;
            showL(false);
        }

        function filterUbi(sI, uI) {
            const s = document.getElementById(sI).value;
            const filtrados = dbFull.filter(x=>x.sector === s);
            document.getElementById(uI).innerHTML = '<option value="">Ubi...</option>' + filtrados.map(x=>`<option value='${JSON.stringify(x)}'>${x.ubi}</option>`).join("");
            document.getElementById(uI).disabled = false;
        }

        function fillRelev() {
            const d = JSON.parse(document.getElementById('r-ubi').value);
            currentRow = d.fila;
            document.getElementById('ri-aire').value = d.inv_aire||"";
            document.getElementById('re-aire').value = d.eq_aire||"";
            document.getElementById('rt-lum').value = d.t_lum||"";
            document.getElementById('rc-lam').value = d.c_lam||"";
            document.getElementById('form-r').classList.remove('hidden');
        }

        async function enviarOT() {
            showL(true);
            const data = {
                action:'nuevaOT', 
                tipo:document.getElementById('ot-tipo').value,
                especialidad:document.getElementById('ot-esp').value,
                edificio:document.getElementById('ot-edif').value,
                sector:document.getElementById('ot-sec').value,
                ubicacion:JSON.parse(document.getElementById('ot-ubi').value).ubi,
                reportadoPor:document.getElementById('ot-repo').value,
                personal:document.getElementById('ot-pers').value,
                descripcion:document.getElementById('ot-desc').value
            };
            const res = await fetch(URL, {method:'POST', body:JSON.stringify(data)}).then(r=>r.text());
            showL(false); alert(res==="Ok"?"OT Creada":"Error"); if(res==="Ok") location.reload();
        }

        async function cerrarOT() {
            showL(true);
            const data = {
                action:'cerrarOT', 
                idOT:document.getElementById('c-id-ot').value,
                materialesUsados:document.getElementById('c-mat').value,
                comentarioFinal:document.getElementById('c-com').value
            };
            const res = await fetch(URL, {method:'POST', body:JSON.stringify(data)}).then(r=>r.text());
            showL(false); alert(res==="Ok"?"OT Cerrada":"Error"); if(res==="Ok") location.reload();
        }

        async function saveRelev() {
            showL(true);
            const data = {
                action:'updateRelevamiento',
                edificio:document.getElementById('r-edif').value,
                fila:currentRow,
                inv_aire:document.getElementById('ri-aire').value,
                eq_aire:document.getElementById('re-aire').value,
                t_lum:document.getElementById('rt-lum').value,
                c_lam:document.getElementById('rc-lam').value
            };
            const res = await fetch(URL, {method:'POST', body:JSON.stringify(data)}).then(r=>r.text());
            showL(false); alert(res==="Ok"?"Actualizado":"Error");
        }

        function showT(t) {
            ['nueva','cierre','relev','historial'].forEach(id=>{
                document.getElementById('s-'+id).classList.add('hidden');
                document.getElementById('t-'+id).classList.remove('tab-active');
            });
            document.getElementById('s-'+t).classList.remove('hidden');
            document.getElementById('t-'+t).classList.add('tab-active');
            if(t==='historial') loadH();
        }

        async function loadH() {
            const h = await fetch(`${URL}?action=getHistorial&token=${PIN_CORRECTO}`).then(r=>r.json());
            document.getElementById('s-historial').innerHTML = h.map(r=>`
                <div class="bg-white p-4 rounded-xl shadow-sm border border-l-4 ${r.est==='Abierta'?'border-l-orange-500':'border-l-green-500'}">
                    <p class="text-[10px] font-black uppercase text-slate-400">ID: ${r.id} | ${r.est}</p>
                    <p class="text-sm font-bold">${r.tarea}</p>
                    <p class="text-[10px] text-slate-500 uppercase">${r.edif} | ${r.tec} | ${r.fecha}</p>
                </div>
            `).join("");
        }
    </script>
</body>
</html>
