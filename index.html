<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mantenimiento FIUNNE 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root { --fiunne-orange: #f06423; --fiunne-gray: #374151; }
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #1e293b; touch-action: manipulation; }
        .loading-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); display: none; justify-content: center; align-items: center; z-index: 3000; flex-direction: column; color: white; }
        .tab-active { border-bottom: 4px solid var(--fiunne-orange); color: var(--fiunne-orange); font-weight: 900; background: #fff7ed; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .hidden { display: none; }
        input, select, textarea { border: 1px solid #cbd5e1 !important; border-radius: 8px !important; padding: 12px !important; width: 100%; margin-bottom: 12px; font-size: 16px; }
        label { font-weight: 700; font-size: 0.875rem; color: #475569; margin-bottom: 4px; display: block; }
        .btn-primary { background: var(--fiunne-orange); color: white; font-weight: 900; padding: 16px; border-radius: 12px; width: 100%; text-transform: uppercase; transition: transform 0.1s; }
        .btn-primary:active { transform: scale(0.98); }
    </style>
</head>
<body class="pb-20">

    <div id="loading" class="loading-overlay">
        <div class="w-12 h-12 border-4 border-white border-t-orange-500 rounded-full animate-spin mb-4"></div>
        <p class="font-bold tracking-widest text-sm uppercase">Procesando...</p>
    </div>

    <div id="login-screen" class="fixed inset-0 bg-white z-[4000] flex flex-col items-center justify-center p-8">
        <img src="https://ingenieria.unne.edu.ar/assets/img/logo-fi-horizontal.png" class="w-64 mb-8" alt="FIUNNE">
        <h1 class="text-2xl font-black mb-6 text-center text-slate-800 uppercase tracking-tighter">Acceso Sistema SGM</h1>
        <input type="password" id="pin" placeholder="Ingrese PIN" class="text-center text-2xl tracking-[1em] mb-4">
        <button onclick="checkPin()" class="btn-primary">Entrar</button>
    </div>

    <header class="bg-white shadow-sm p-4 sticky top-0 z-50 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black text-slate-900 leading-none">SGM PRO 2026</h1>
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">FIUNNE Mantenimiento</p>
        </div>
        <div id="user-badge" class="bg-slate-100 px-3 py-1 rounded-full text-[10px] font-black uppercase text-slate-600">Admin</div>
    </header>

    <nav class="flex bg-white border-b sticky top-[60px] z-40 overflow-x-auto no-scrollbar shadow-sm">
        <button onclick="showT('nueva')" id="t-nueva" class="flex-1 py-4 px-2 text-[10px] font-bold uppercase tracking-tighter whitespace-nowrap tab-active">Nueva OT</button>
        <button onclick="showT('cierre')" id="t-cierre" class="flex-1 py-4 px-2 text-[10px] font-bold uppercase tracking-tighter whitespace-nowrap">Cierre</button>
        <button onclick="showT('relev')" id="t-relev" class="flex-1 py-4 px-2 text-[10px] font-bold uppercase tracking-tighter whitespace-nowrap">Relevamiento</button>
        <button onclick="showT('extintores')" id="t-extintores" class="flex-1 py-4 px-2 text-[10px] font-bold uppercase tracking-tighter whitespace-nowrap">Extintores</button>
        <button onclick="showT('historial')" id="t-historial" class="flex-1 py-4 px-2 text-[10px] font-bold uppercase tracking-tighter whitespace-nowrap">Historial</button>
    </nav>

    <main class="p-4 max-w-lg mx-auto">
        
        <section id="s-nueva" class="space-y-4">
            <div class="bg-white p-6 rounded-2xl shadow-sm border">
                <label>Tipo de Requerimiento</label>
                <select id="ot-tipo">
                    <option value="Correctivo">Mantenimiento Correctivo</option>
                    <option value="Preventivo">Mantenimiento Preventivo</option>
                </select>

                <label>Especialidad</label>
                <select id="ot-esp">
                    <option value="Electrico">Eléctrico</option>
                    <option value="Refrigeracion">Refrigeración / AA</option>
                    <option value="Herreria">Herrería / Carpintería</option>
                    <option value="Plomeria">Plomería</option>
                    <option value="Albañileria">Albañilería / Pintura</option>
                </select>

                <label>Edificio</label>
                <select id="ot-edif" onchange="loadCascada('ot-edif', 'ot-sec', 'ot-ubi')">
                    <option value="">Cargando edificios...</option>
                </select>

                <label>Sector</label>
                <select id="ot-sec" onchange="filterUbi('ot-sec', 'ot-ubi')" disabled>
                    <option value="">Seleccione edificio...</option>
                </select>

                <label>Ubicación Específica</label>
                <select id="ot-ubi" disabled onchange="fillOtUbi()">
                    <option value="">Seleccione sector...</option>
                </select>

                <label>Reportado por (Nombre y Celular)</label>
                <input type="text" id="ot-repo" placeholder="Ej: Juan Perez - 3624...">

                <label>Personal Asignado</label>
                <input type="text" id="ot-pers" placeholder="Técnicos que intervienen">

                <label>Descripción de la Tarea / Falla</label>
                <textarea id="ot-desc" rows="3" placeholder="Detalle el problema..."></textarea>

                <button onclick="enviarOT()" class="btn-primary mt-4">Generar Orden de Trabajo</button>
            </div>
        </section>

        <section id="s-cierre" class="hidden space-y-4">
            <div class="bg-white p-6 rounded-2xl shadow-sm border">
                <label>Seleccionar OT Abierta</label>
                <select id="c-id-ot"><option value="">Cargando...</option></select>

                <label>Detalle de Materiales Usados</label>
                <textarea id="c-mat" rows="3" placeholder="Ej: 2 tubos led, 1 cinta aisladora..."></textarea>

                <label>Comentario Final / Resolución</label>
                <textarea id="c-com" rows="3" placeholder="¿Qué se hizo?"></textarea>

                <button onclick="cerrarOT()" class="btn-primary">Cerrar Orden de Trabajo</button>
            </div>
        </section>

        <section id="s-relev" class="hidden space-y-4">
            <div class="bg-white p-6 rounded-2xl shadow-sm border">
                <label>Edificio</label>
                <select id="r-edif" onchange="loadCascada('r-edif', 'r-sec', 'r-ubi')">
                    <option value="">Cargando...</option>
                </select>

                <label>Sector</label>
                <select id="r-sec" onchange="filterUbi('r-sec', 'r-ubi')" disabled>
                    <option value="">Sector...</option>
                </select>

                <label>Ubicación</label>
                <select id="r-ubi" disabled onchange="fillRelevFields()">
                    <option value="">Ubi...</option>
                </select>

                <div id="relev-form" class="hidden mt-6 pt-6 border-t space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div><label>Inv. Aire</label><input type="text" id="r-inv-a"></div>
                        <div><label>Eq. Aire</label><input type="text" id="r-eq-a"></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label>Tipo Lum.</label><input type="text" id="r-t-lum"></div>
                        <div><label>Cant. Lam.</label><input type="number" id="r-c-lam"></div>
                    </div>
                    <button onclick="saveRelevamiento()" class="btn-primary">Actualizar Datos</button>
                </div>
            </div>
        </section>

        <section id="s-historial" class="hidden space-y-2" id="hist-list">
            </section>

    </main>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbwLcxg2he0kUVgqFO__f6vlwF2EOMGICJsEzvAbRMihh4JzxIDkBSeRLWN3MXlbBJbdhA/exec";
        const PIN_CORRECTO = "4370";
        let dbU = []; // Base de datos de ubicaciones cargada temporalmente
        let currentRelevFila = null;

        function showL(v) { document.getElementById('loading').style.display = v ? 'flex' : 'none'; }

        function checkPin() {
            if(document.getElementById('pin').value === PIN_CORRECTO) {
                document.getElementById('login-screen').classList.add('hidden');
                initApp();
            } else { alert("PIN Incorrecto"); }
        }

        async function initApp() {
            showL(true);
            try {
                // Cargar Edificios
                const eds = await fetch(`${URL}?action=getEdificios&token=${PIN_CORRECTO}`).then(r=>r.json());
                const options = '<option value="">Seleccione Edificio...</option>' + eds.map(e => `<option value="${e}">${e}</option>`).join("");
                document.getElementById('ot-edif').innerHTML = options;
                document.getElementById('r-edif').innerHTML = options;

                // Cargar OTs Abiertas
                const ots = await fetch(`${URL}?action=getAbiertas&token=${PIN_CORRECTO}`).then(r=>r.json());
                document.getElementById('c-id-ot').innerHTML = '<option value="">Seleccionar OT...</option>' + ots.map(o => `<option value="${o.id}">${o.detalle}</option>`).join("");
            } catch(e) { console.error(e); }
            showL(false);
        }

        // --- LÓGICA DE CASCADAS CORREGIDA ---
        async function loadCascada(eI, sI, uI) { 
            const ed = document.getElementById(eI).value; 
            if(!ed) return;
            showL(true); 
            try {
                dbU = await fetch(`${URL}?action=getSectores&edificio=${encodeURIComponent(ed)}&token=${PIN_CORRECTO}`).then(r=>r.json()); 
                const sectoresUnicos = [...new Set(dbU.map(x => x.sector))].filter(s => s);
                document.getElementById(sI).innerHTML = '<option value="">Sector...</option>' + sectoresUnicos.map(s => `<option value="${s}">${s}</option>`).join(""); 
                document.getElementById(sI).disabled = false; 
                document.getElementById(uI).innerHTML = '<option value="">Ubicación...</option>';
                document.getElementById(uI).disabled = true;
                if(eI === 'r-edif') document.getElementById('relev-form').classList.add('hidden');
            } catch(e) { console.error(e); }
            showL(false); 
        }

        function filterUbi(sI, uI) { 
            const s = document.getElementById(sI).value; 
            if(!s) return;
            const filtrados = dbU.filter(x => x.sector === s);
            document.getElementById(uI).innerHTML = '<option value="">Ubi...</option>' + filtrados.map(x => `<option value='${JSON.stringify(x)}'>${x.ubi}</option>`).join(""); 
            document.getElementById(uI).disabled = false; 
        }

        // --- FUNCIONES DE FORMULARIO ---
        function fillOtUbi() {
            // Solo para Nueva OT si quisiéramos precargar algo
        }

        function fillRelevFields() { 
            const d = JSON.parse(document.getElementById('r-ubi').value); 
            currentRelevFila = d.fila; 
            document.getElementById('r-inv-a').value = d.inv_aire || ""; 
            document.getElementById('r-eq-a').value = d.eq_aire || ""; 
            document.getElementById('r-t-lum').value = d.t_lum || ""; 
            document.getElementById('r-c-lam').value = d.c_lam || ""; 
            document.getElementById('relev-form').classList.remove('hidden'); 
        }

        async function enviarOT() {
            const data = {
                action: 'nuevaOT',
                token: PIN_CORRECTO,
                tipo: document.getElementById('ot-tipo').value,
                especialidad: document.getElementById('ot-esp').value,
                edificio: document.getElementById('ot-edif').value,
                sector: document.getElementById('ot-sec').value,
                ubicacion: JSON.parse(document.getElementById('ot-ubi').value).ubi,
                reportadoPor: document.getElementById('ot-repo').value,
                personal: document.getElementById('ot-pers').value,
                descripcion: document.getElementById('ot-desc').value
            };
            showL(true);
            const res = await fetch(URL, {method:'POST', body: JSON.stringify(data)}).then(r=>r.text());
            showL(false);
            alert(res === "Ok" ? "¡OT Creada con éxito!" : "Error: " + res);
            if(res === "Ok") location.reload();
        }

        async function cerrarOT() {
            const data = {
                action: 'cerrarOT',
                token: PIN_CORRECTO,
                idOT: document.getElementById('c-id-ot').value,
                materialesUsados: document.getElementById('c-mat').value,
                comentarioFinal: document.getElementById('c-com').value
            };
            showL(true);
            const res = await fetch(URL, {method:'POST', body: JSON.stringify(data)}).then(r=>r.text());
            showL(false);
            alert(res === "Ok" ? "OT Cerrada correctamente" : "Error");
            if(res === "Ok") location.reload();
        }

        async function saveRelevamiento() {
            showL(true);
            const data = {
                action: 'updateRelevamiento',
                token: PIN_CORRECTO,
                edificio: document.getElementById('r-edif').value,
                fila: currentRelevFila,
                inv_aire: document.getElementById('r-inv-a').value,
                eq_aire: document.getElementById('r-eq-a').value,
                t_lum: document.getElementById('r-t-lum').value,
                c_lam: document.getElementById('r-c-lam').value
            };
            const res = await fetch(URL, {method:'POST', body: JSON.stringify(data)}).then(r=>r.text());
            showL(false);
            alert(res === "Ok" ? "Relevamiento actualizado" : "Error");
        }

        function showT(t) {
            ['nueva','cierre','relev','extintores','historial'].forEach(id => {
                document.getElementById('s-'+id).classList.add('hidden');
                document.getElementById('t-'+id).classList.remove('tab-active');
            });
            document.getElementById('s-'+t).classList.remove('hidden');
            document.getElementById('t-'+t).classList.add('tab-active');
            if(t === 'historial') loadHistorial();
        }

        async function loadHistorial() {
            const h = await fetch(`${URL}?action=getHistorial&token=${PIN_CORRECTO}`).then(r=>r.json());
            document.getElementById('s-historial').innerHTML = h.map(r => `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-l-4 ${r.est === 'Abierta' ? 'border-l-orange-500' : 'border-l-green-500'}">
                    <div class="flex justify-between font-black text-xs mb-1">
                        <span>#${r.id}</span>
                        <span class="${r.est === 'Abierta' ? 'text-orange-600' : 'text-green-600'}">${r.est}</span>
                    </div>
                    <p class="text-sm font-bold">${r.edif} - ${r.tarea}</p>
                    <p class="text-[10px] text-slate-500 font-bold uppercase">${r.fecha} | Tec: ${r.tec}</p>
                </div>
            `).join("");
        }
    </script>
</body>
</html>
